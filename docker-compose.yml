x-service-common: &service-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


  currency:
    <<: *service-common
    working_dir: /app/currency
    command: python main.py
    volumes:
      - ./currency:/app/currency
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8083:8083"
    environment:
      - FAILURE_RATE=${CURRENCY_FAILURE_RATE:-0}
      - LATENCY_MS=${CURRENCY_LATENCY_MS:-0}

  productcatalog:
    <<: *service-common
    working_dir: /app/productcatalog
    command: python main.py
    volumes:
      - ./productcatalog:/app/productcatalog
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8081:8081"
    environment:
      - FAILURE_RATE=${PRODUCTCATALOG_FAILURE_RATE:-0}
      - LATENCY_MS=${PRODUCTCATALOG_LATENCY_MS:-0}

  ad:
    <<: *service-common
    working_dir: /app/ad
    command: python main.py
    volumes:
      - ./ad:/app/ad
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8089:8089"

  recommendation:
    <<: *service-common
    working_dir: /app/recommendation
    command: python main.py
    volumes:
      - ./recommendation:/app/recommendation
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8088:8088"
    environment:
      - PRODUCT_CATALOG_URL=http://productcatalog:8081
      - FAILURE_RATE=${RECOMMENDATION_FAILURE_RATE:-0}
      - LATENCY_MS=${RECOMMENDATION_LATENCY_MS:-0}
    depends_on:
      - productcatalog

  shipping:
    <<: *service-common
    working_dir: /app/shipping
    command: python main.py
    volumes:
      - ./shipping:/app/shipping
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8084:8084"
    environment:
      - FAILURE_RATE=${SHIPPING_FAILURE_RATE:-0}
      - LATENCY_MS=${SHIPPING_LATENCY_MS:-0}

  payment:
    <<: *service-common
    working_dir: /app/payment
    command: python main.py
    volumes:
      - ./payment:/app/payment
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8085:8085"
    environment:
      - FAILURE_RATE=${PAYMENT_FAILURE_RATE:-0}
      - LATENCY_MS=${PAYMENT_LATENCY_MS:-0}

  email:
    <<: *service-common
    working_dir: /app/email
    command: python main.py
    volumes:
      - ./email:/app/email
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8086:8086"

  cart:
    <<: *service-common
    working_dir: /app/cart
    command: python main.py
    volumes:
      - ./cart:/app/cart
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8082:8082"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FAILURE_RATE=${CART_FAILURE_RATE:-0}
      - LATENCY_MS=${CART_LATENCY_MS:-0}
    depends_on:
      redis:
        condition: service_healthy

  checkout:
    <<: *service-common
    working_dir: /app/checkout
    command: python main.py
    volumes:
      - ./checkout:/app/checkout
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8087:8087"
    environment:
      - CART_URL=http://cart:8082
      - PRODUCT_CATALOG_URL=http://productcatalog:8081
      - CURRENCY_URL=http://currency:8083
      - SHIPPING_URL=http://shipping:8084
      - PAYMENT_URL=http://payment:8085
      - EMAIL_URL=http://email:8086
      - FAILURE_RATE=${CHECKOUT_FAILURE_RATE:-0}
      - LATENCY_MS=${CHECKOUT_LATENCY_MS:-0}
    depends_on:
      - cart
      - productcatalog
      - currency
      - shipping
      - payment
      - email

  # frontend ocust hits here
  frontend:
    <<: *service-common
    working_dir: /app/frontend
    command: python main.py
    volumes:
      - ./frontend:/app/frontend
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8080:8080"
    environment:
      - PRODUCT_CATALOG_URL=http://productcatalog:8081
      - CART_URL=http://cart:8082
      - CURRENCY_URL=http://currency:8083
      - SHIPPING_URL=http://shipping:8084
      - CHECKOUT_URL=http://checkout:8087
      - RECOMMENDATION_URL=http://recommendation:8088
      - AD_URL=http://ad:8089
      - CIRCUIT_BREAKER_ENABLED=${CIRCUIT_BREAKER_ENABLED:-false}
      - CB_FAIL_MAX=${CB_FAIL_MAX:-5}
      - CB_RESET_TIMEOUT=${CB_RESET_TIMEOUT:-30}
    depends_on:
      - productcatalog
      - cart
      - currency
      - shipping
      - checkout
      - recommendation
      - ad

  loadgenerator:
    build: ./loadgenerator
    ports: 
      - "8090:8089"
    volumes:
      - ./loadgenerator:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host=http://frontend:8080
    depends_on:
      - frontend
    profiles:
      - loadtext

networks:
  default:
    name: online-boutique

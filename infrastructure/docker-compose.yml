version: '3.8'

services:
  eureka-server:
    build: ../services/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - tolerant
    healthcheck:
      test: ["CMD", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - tolerant
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-service:
    build: ../services/order-service
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=${PROFILE:-baseline}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - RABBITMQ_HOST=rabbitmq
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      - eureka-server
      - rabbitmq
    networks:
      - tolerant
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  payment-service:
    build: ../services/payment-service
    container_name: payment-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
      - CHAOS_ENABLED=${CHAOS_ENABLED:-false}
      - CHAOS_FAILURE_RATE=${CHAOS_FAILURE_RATE:-0.0}
      - CHAOS_DELAY_MS=${CHAOS_DELAY_MS:-0}
      - JAVA_OPTS=-Xms512m -Xms256m

  inventory-service:
    build: ../services/inventory-service
    container_name: inventory-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
      - CHAOS_ENABLED=${CHAOS_ENABLED:-false}
      - CHAOS_FAILURE_RATE=${CHAOS_FAILURE_RATE:-0.0}
      - CHAOS_DELAY_MS=${CHAOS_DELAY_MS:-0}
      - JAVA_OPTS=-Xms512m -Xms256m
    depends_on:
      - eureka-server
    networks:
      - tolerant
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries-1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  notification-service:
    build: ../services/notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
      - RABBITMQ_HOST=rabbitmq
      - CHAOS_ENABLED=${CHAOS_ENABLED:-false}
      - CHAOS_FAILURE_RATE=${CHAOS_FAILURE_RATE:-0.0}
      - CHAOS_DELAY_MS=${CHAOS_DELAY_MS:-0}
      - JAVA_OPTS=-Xmx512m Xms256m
    depends_on:
      - eureka-server
      - rabbitmq
    networks:
      - tolerant
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http:localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-gateway:
    build: ../services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment: 
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xms256m -Xms512m
    depends_on:
      - eureka-server
      - order-service
      - payment-service
      - inventory-service
      - notification-service
    networks:
      - tolerant
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "hhtp://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  tolerant:
    driver: bridge
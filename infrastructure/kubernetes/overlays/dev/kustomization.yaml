apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

bases:
  - ../../base

commonLabels:
  environment: dev

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: order-service
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: order-service
                resources:
                  requests:
                    memory: "256Mi"
                    cpu: "100m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: inventory-service
      spec:
        replicas: 2
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payment-service
      spec:
        replicas: 2

configMapGenerator:
  - name: service-config
    behavior: merge
    literals:
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
      - ENABLE_DEBUG_ENDPOINTS=true
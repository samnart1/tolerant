apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

bases:
  - ../../base

commonLabels:
  environment: production

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: order-service
      spec:
        replicas: 5
        template:
          spec:
            containers:
              - name: order-service
                resources:
                  requests:
                    memory: "1Gi"
                    cpu: "500m"
                  limits:
                    memory: "2Gi"
                    cpu: "2000m"
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: inventory-service
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: inventory-service
                resources:
                  requests:
                    memory: "512Mi"
                    cpu: "250m"
                  limits:
                    memory: "1Gi"
                    cpu: "1000m"
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: payment-service
      spec:
        replicas: 3

configMapGenerator:
  - name: service-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - ENABLE_DEBUG_ENDPOINTS=false
      - ENABLE_METRICS=true
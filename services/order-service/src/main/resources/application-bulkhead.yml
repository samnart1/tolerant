# Bulkhead Profile
# Tests the bulkhead pattern's impact on resource isolation and preventing resource exhaustion

spring:
  profiles:
    active: bulkhead

# Resilience Configuration - Bulkhead Pattern
resilience4j:
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 10
        max-wait-duration: 0ms
    instances:
      orderService:
        max-concurrent-calls: 25
        max-wait-duration: 100ms
      payment:
        max-concurrent-calls: 15
        max-wait-duration: 50ms
      inventory:
        max-concurrent-calls: 15
        max-wait-duration: 50ms
      notification:
        max-concurrent-calls: 20
        max-wait-duration: 0ms

  thread-pool-bulkhead:
    configs:
      default:
        max-thread-pool-size: 10
        core-thread-pool-size: 5
        queue-capacity: 20
        keep-alive-duration: 20ms
    instances:
      orderService:
        max-thread-pool-size: 20
        core-thread-pool-size: 10
        queue-capacity: 50

  # Basic timeout
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
    instances:
      payment:
        timeout-duration: 5s
      inventory:
        timeout-duration: 3s
      notification:
        timeout-duration: 2s

  # Basic retry
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 500ms

  # Disable circuit breaker
  circuitbreaker:
    configs:
      default:
        enabled: false

messaging:
  enabled: false

chaos:
  enabled: false

resilience:
  timeout:
    duration: 5s

logging:
  level:
    '[com.tolerant.order_service]': DEBUG
    '[io.github.resilience4j.bulkhead]': DEBUG

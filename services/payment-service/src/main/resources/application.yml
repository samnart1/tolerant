server:
  port: 8082

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

# payment processing configuration
payment:
  processing:
    base-delay-ms: 100
    random-delay-ms: 200

# chaos engineering
chaos:
  enabled: ${CHAOS_ENABLED:false}
  failure-rate: ${CHAOS_FAILURE_RATE:0.0}
  delay-ms: ${CHAOS_DELAY_MS:0}

#logging
logging:
  level:
    '[com.tolerant.payment_service]': INFO
    '[org.springframework.web]': INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        '[http.server.requests]': true
  prometheus:
    metrics:
      export:
        enabled: true